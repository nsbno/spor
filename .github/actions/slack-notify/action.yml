name: Slack Notify
description: Sends a Slack notification
inputs:
  repo:
    description: The repository name
    required: true
  published_packages:
    description: The release body
    required: true
  webhook_url:
    description: The Slack webhook URL
    required: true

runs:
  using: "composite"
  steps:
    - name: Send Slack Notification
      shell: bash
      run: |
        version=$(echo '${{ inputs.published_packages }}' | jq -r '.[] | select(.name=="@vygruppen/spor-react") | .version')
        if [ -z "$version" ]; then
          echo "No @vygruppen/spor-react version found in published_packages. Skipping notification."
          exit 0
        fi

        encoded_version=$(echo -n "@vygruppen/spor-react@$version" | jq -sRr @uri)
        release_url="https://github.com/${{ inputs.repo }}/releases/tag/${encoded_version}"
        api_url="https://api.github.com/repos/${{ inputs.repo }}/releases/tags/${encoded_version}"

        # Try to fetch release notes for the newly published package version.
        release_body=$(curl -fsSL -H 'Accept: application/vnd.github+json' "$api_url" | jq -r '.body // empty' || true)

        if [ -n "$release_body" ]; then
          summary=$(printf "%s" "$release_body" | \
            sed 's/\r//g' | \
            grep -vE '^\s*$' | \
            grep -viE 'updated dependencies' | \
            grep -vE '^\s*@vygruppen/' | \
            sed 's/^### //' | \
            sed 's/^Patch Changes$/🐛 Patch Changes/' | \
            sed 's/^Minor Changes$/✨ Minor Changes/' | \
            sed 's/^Major Changes$/💥 Major Changes/' | \
            sed 's/^-   [a-f0-9]\+: /• /' | \
            head -n 6)
          if [ -z "$summary" ]; then
            summary="Ingen oppsummering tilgjengelig i release-notatet."
          fi
        else
          summary="Ingen oppsummering tilgjengelig i release-notatet."
        fi

        message=$(printf '%s\n' \
          '*Ny versjon av spor er ute!* 📦✨' \
          "⚡️ *Versjon*: v${version}" \
          '🔧 *Installer*: `npm i @vygruppen/spor-react@latest`' \
          '' \
          "📖 *Changelog*: <${release_url}|@vygruppen/spor-react@${version}>" \
          '📝 *Hva er nytt:*' \
          "$summary")

        payload=$(jq -n --arg text "$message" '{text: $text}')
        curl -X POST -H 'Content-type: application/json' --data "$payload" ${{ inputs.webhook_url }}
